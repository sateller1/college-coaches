<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NCAA Division III football coaches contact directory for recruiting. Search coach emails, schools, and staff details.">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <link rel="canonical" href="https://www.collegecoaches.us/football-division-3.html">
  <title>Division III Football Coaches Contact Directory</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="displayCSV.js" defer></script>
</head>
<body>
  <header>
    <h1>Division III Football Coaches</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="football.html">Football</a>
      <a href="football-division-1.html">D1 Football</a>
      <a href="football-division-2.html">D2 Football</a>
      <a href="football-division-3.html">D3 Football</a>
      <a href="resources.html">Resources</a>
    </nav>
  </header>
  <main>
    <section class="content">
      <p>Use this page to search NCAA Division III football coach contact information for recruiting outreach.</p>
      <div class="tabs">
        <button id="div3-btn" onclick="loadCSV('data/football-div3.csv', this)">Division III</button>
      </div>
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search coaches, schools, or emails..." onkeyup="filterTable()">
      </div>
      <div id="csv-table"></div>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 CollegeCoaches.us | <a href="/privacypolicy.html">Privacy Policy</a> | <a href="/faq.html">FAQ</a> | <a href="/contact.html">Contact</a></p>
  </footer>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const div3Button = document.getElementById("div3-btn");
      loadCSV("data/football-div3.csv", div3Button);
      div3Button.classList.add("active");
    });
  </script>
</body>
</html>
